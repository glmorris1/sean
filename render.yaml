services:
  - type: web
    name: ghosttrade-auth
    runtime: node
    rootDir: sean-backend
    plan: starter
    buildCommand: npm ci
    startCommand: npm run start:production
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ghosttrade-auth-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://glmorris1.github.io
      - key: FIREBASE_PROJECT_ID
        value: ghosttrade-app
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: ghosttrade-auth-db
    plan: starter
